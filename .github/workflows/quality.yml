name: Quality Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Validate composer.json
        run: composer validate

      - name: Install PHPCS
        run: composer global require squizlabs/php_codesniffer

      - name: Check PHPCS Version
        run: ~/.composer/vendor/bin/phpcs --version || ~/.config/composer/vendor/bin/phpcs --version