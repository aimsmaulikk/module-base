name: Quality Checks

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Show PHP Version
        run: php -v

      - name: Validate composer.json
        run: composer validate