name: Quality Checks

on:
  pull_request:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer
          coverage: none

      - name: Validate composer.json
        run: composer validate

      - name: Verify QA Tools Configuration
        run: test -f tools/composer.json

  phpcs:
    name: Code Style (PHPCS)
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer
          coverage: none

      - name: Cache QA Tools
        uses: actions/cache@v4
        with:
          path: tools/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('tools/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install QA Tools
        working-directory: tools
        run: composer install --no-interaction --prefer-dist

      - name: Get Changed PHP Files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.php

      - name: Run PHPCS
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "Changed PHP files:"
          echo "${{ steps.changed-files.outputs.all_changed_files }}"

          tools/vendor/bin/phpcs \
            --standard=phpcs.xml \
            ${{ steps.changed-files.outputs.all_changed_files }}